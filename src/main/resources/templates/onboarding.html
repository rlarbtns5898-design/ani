<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Onboarding</title>
</head>
<body>

<h2>애니메이션 취향 선택</h2>

<form action="/onboarding/save" method="post">

    <div th:each="anime : ${animeList}" style="margin-bottom:20px; border:1px solid #ccc; padding:10px;">

        <!-- 이미지 -->
        <img th:src="${anime.imageUrl}" width="150">

        <!-- 제목 -->
        <p th:text="${anime.title}"></p>

        <!-- malId hidden -->
        <input type="hidden" name="malId" th:value="${anime.malId}">

        <!-- 봤는지 -->
        <label>
            <input type="checkbox" name="watched" value="true">
            봤어요
        </label>

        <!-- 평점 -->
        <select name="score">
            <option value="0">평점 선택</option>
            <option value="1">⭐ 1</option>
            <option value="2">⭐ 2</option>
            <option value="3">⭐ 3</option>
            <option value="4">⭐ 4</option>
            <option value="5">⭐ 5</option>
        </select>

    </div>

    <button type="submit">저장</button>

</form>

</body>
</html>
