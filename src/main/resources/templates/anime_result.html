<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>검색 결과</title>
  </head>
  <body>
    <h1>검색 결과</h1>

    <div th:if="${result != null}">
      <div th:each="anime : ${result.data}">
        <h2>
          <a
            th:href="@{/anime/{id}(id=${anime.mal_id})}"
            th:text="${anime.title}"
          >
          </a>
        </h2>
        <a th:href="@{/anime/{id}(id=${anime.mal_id})}">
          <img th:src="${anime.images.jpg.image_url}" width="150" />
        </a>
        <p>
          <strong>장르:</strong>
          <span th:each="genre, stat : ${anime.genres}">
            <span th:text="${genre.name}"></span>
            <span th:if="${!stat.last}">, </span>
          </span>
        </p>

        <p>평점: <span th:text="${anime.score}"></span></p>
        <hr />
      </div>
    </div>

    <a href="/home">메인으로</a>
  </body>
</html>
