<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>검색 결과</title>
</head>
<body>

<h1>검색 결과</h1>

<div th:if="${result != null}">
    <div th:each="anime : ${result.data}">
        <h2 th:text="${anime.title}"></h2>
        <img th:src="${anime.images.jpg.image_url}" width="150">
        <p th:text="${anime.synopsis}"></p>
        <p>평점: <span th:text="${anime.score}"></span></p>
        <hr>
    </div>
</div>

<a href="/home">메인으로</a>

</body>
</html>
