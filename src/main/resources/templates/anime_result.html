<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>검색 결과</title>
  </head>
  <body>
    <h1>검색 결과</h1>

    <div th:if="${result != null}">
      <div th:each="anime : ${result.data}">
        <h2>
          <a
            th:href="@{/anime/{id}(id=${anime.mal_id})}"
            th:text="${anime.title}"
          >
          </a>
        </h2>
        <a th:href="@{/anime/{id}(id=${anime.mal_id})}">
          <img th:src="${anime.images.jpg.image_url}" width="150" />
        </a>
        <p>
          <strong>장르:</strong>
          <span th:each="genre, stat : ${anime.genres}">
            <span th:text="${genre.name}"></span>
            <span th:if="${!stat.last}">, </span>
          </span>
        </p>

        <p>평점: <span th:text="${anime.score}"></span></p>
        <hr />
      </div>
    </div>

    <a href="/home">메인으로</a>

    <div>
      <!-- 맨 앞 1페이지 -->
      <span th:if="${startPage > 1}">
        <a th:href="@{/anime/search(${param}, page=1)}">1</a>

        <span th:if="${startPage > 2}"> ... </span>
      </span>

      <!-- 현재 기준 5개 -->
      <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
        <a
          th:if="${i != currentPage}"
          th:href="@{/anime/search(${param}, page=${i})}"
          th:text="${i}"
        >
        </a>

        <strong th:if="${i == currentPage}" th:text="${i}"> </strong>

        &nbsp;
      </span>

      <!-- 마지막 페이지 -->
      <span th:if="${endPage < lastPage}">
        <span th:if="${endPage < lastPage - 1}"> ... </span>

        <a
          th:href="@{/anime/search(${param}, page=${lastPage})}"
          th:text="${lastPage}"
        >
        </a>
      </span>
    </div>
  </body>
</html>
