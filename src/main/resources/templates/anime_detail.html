<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>상세 정보</title>
</head>
<body>
<h1 th:text="${anime.title}">제목 없음</h1>

<img th:src="${anime.images?.jpg?.imageUrl}" width="200" alt="이미지 없음" />

<p><strong>타입:</strong> <span th:text="${anime.type ?: '정보 없음'}"></span></p>

<p>
  <strong>에피소드:</strong>
  <span th:text="${anime.episodes ?: '정보 없음'}"></span>
</p>

<p><strong>방영:</strong> <span th:text="${anime.status ?: '정보 없음'}"></span></p>

<p><strong>평점:</strong> <span th:text="${anime.score ?: '정보 없음'}"></span></p>

<p>
  <strong>장르:</strong>
  <span th:if="${anime.genres != null}" th:each="g, stat : ${anime.genres}">
        <span th:text="${g.name}"></span><span th:if="${!stat.last}">, </span>
      </span>
  <span th:if="${anime.genres == null}">정보 없음</span>
</p>

<p>
  <strong>테마:</strong>
  <span th:if="${anime.themes != null}" th:each="t, stat : ${anime.themes}">
        <span th:text="${t.name}"></span><span th:if="${!stat.last}">, </span>
      </span>
  <span th:if="${anime.themes == null}">정보 없음</span>
</p>

<p>
  <strong>독자층:</strong>
  <span th:if="${anime.demographics != null}" th:each="d, stat : ${anime.demographics}">
        <span th:text="${d.name}"></span><span th:if="${!stat.last}">, </span>
      </span>
  <span th:if="${anime.demographics == null}">정보 없음</span>
</p>

<p><strong>줄거리:</strong></p>
<p th:text="${anime.synopsis ?: '줄거리 정보 없음'}"></p>

<form th:action="@{/mylist/add}" method="post">
  <input type="hidden" name="malId" th:value="${anime.malId}" />
  <label>평점 (1~10)</label>
  <select name="score">
    <option th:each="i : ${#numbers.sequence(1,10)}" th:value="${i}" th:text="${i}"></option>
  </select>

  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

  <button type="submit">평점 등록</button>
</form>

<div th:if="${alreadyAdded}">
  <p style="color: green">✔ 이미 내 리스트에 추가된 애니입니다.</p>
</div>

<form th:if="${!alreadyAdded}" th:action="@{/mylist/add}" method="post">
  <input type="hidden" name="animeId" th:value="${anime.malId}" />
  <input type="hidden" name="title" th:value="${anime.title}" />
  <input type="hidden" name="imageUrl" th:value="${anime.images?.jpg?.imageUrl}" />
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

  <button type="submit">내 리스트에 추가</button>
</form>

<a href="javascript:history.back()">뒤로가기</a>
</body>
</html>
