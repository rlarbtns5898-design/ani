<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>상세 정보</title>
  </head>
  <body>
    <h1 th:text="${anime.title ?: '제목 없음'}">제목 없음</h1>

    <!-- 이미지 null 안전하게 처리 -->
    <img
      th:if="${anime.images?.jpg?.imageUrl != null}"
      th:src="${anime.images.jpg.imageUrl}"
      width="200"
      alt="이미지 없음"
    />
    <p th:if="${anime.images?.jpg?.imageUrl == null}">이미지 없음</p>

    <p>
      <strong>타입:</strong>
      <span th:text="${anime.type ?: '정보 없음'}"></span>
    </p>

    <p>
      <strong>방영 여부:</strong>
      <span th:text="${anime.status ?: '정보 없음'}"></span>
    </p>

    <p>
      <strong>시청 연령:</strong>
      <span th:text="${anime.rating ?: '정보 없음'}"></span>
    </p>

    <p>
      <strong>평점:</strong>
      <span th:text="${anime.score ?: '정보 없음'}"></span>
    </p>

    <p>
      <strong>장르:</strong>
      <span
        th:each="g, stat : ${anime.genres}"
        th:text="${g.name + (stat.last ? '' : ', ')}"
      ></span>
    </p>

    <p>
      <strong>테마:</strong>
      <span
        th:each="t, stat : ${anime.themes}"
        th:text="${t.name + (stat.last ? '' : ', ')}"
      ></span>
    </p>

    <p>
      <strong>독자층:</strong>
      <span
        th:each="d, stat : ${anime.demographics}"
        th:text="${d.name + (stat.last ? '' : ', ')}"
      ></span>
    </p>

    <!-- 에피소드 null 체크 -->
    <p>
      <!-- 평점 등록 폼 -->
    </p>

    <p th:if="${rating != null}">
      내가 매긴 평점 : <span th:text="${rating.score}"></span>
    </p>

    <form th:action="@{/rate}" method="post">
      <input type="hidden" name="malId" th:value="${anime.malId}" />

      <label>평점 (1~10)</label>

      <select name="score">
        <option
          th:each="i : ${#numbers.sequence(1,10)}"
          th:value="${i}"
          th:text="${i}"
          th:selected="${rating != null and rating.score == i}"
        ></option>
      </select>

      <button type="submit">평점 등록</button>
    </form>

    <a href="javascript:history.back()">뒤로가기</a>
  </body>
</html>
