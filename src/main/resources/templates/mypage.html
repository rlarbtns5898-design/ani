<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>마이페이지</title>
  </head>
  <body>
    <h1>마이페이지</h1>

    <h2>내가 평가한 애니</h2>

    <div th:each="anime : ${animeList}">
      <a th:href="@{'/anime/' + ${anime.malId}}">
        <img th:src="${anime.imageUrl}" width="120" />

        <p th:text="${anime.title}"></p>
      </a>

      <p>
        내가 준 평점 :
        <span th:text="${anime.score}"></span>
      </p>

      <hr />
    </div>
  </body>
</html>
